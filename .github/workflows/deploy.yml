name: Deploy to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - 'km-app/**'
      - '.github/workflows/deploy.yml'

env:
  PROJECT_ID: kings-market-491600
  REGION: us-east4
  SERVICE: kings-market-app
  IMAGE: us-east4-docker.pkg.dev/kings-market-491600/kings-market/app

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # needed for Workload Identity Federation

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-east4-docker.pkg.dev --quiet

      - name: Build and push Docker image
        run: |
          docker build -t $IMAGE:$GITHUB_SHA -t $IMAGE:latest ./km-app
          docker push $IMAGE:$GITHUB_SHA
          docker push $IMAGE:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy $SERVICE \
            --image $IMAGE:$GITHUB_SHA \
            --region $REGION \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars "DB_NAME=${{ secrets.DB_NAME }},DB_USER=${{ secrets.DB_USER }}" \
            --set-secrets "DB_PASSWORD=km-db-password:latest,JWT_SECRET=km-jwt-secret:latest" \
            --min-instances 0 \
            --max-instances 3
